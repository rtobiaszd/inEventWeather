services:
  # ── Frontend (Static Site) ──────────────────────────────────
  - type: static
    name: inevent-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://inevent-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend (Web Service - Docker) ──────────────────────────
  - type: web
    name: inevent-api
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: APP_KEY
        value: base64:Q3VzdG9tS2V5Rm9yRXZlbnRXZWF0aGVyRGFzaGJvYXI=
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: OPENWEATHER_API_KEY
        sync: false
