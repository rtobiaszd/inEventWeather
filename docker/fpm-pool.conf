; Pool FPM otimizado — mantém workers pré-aquecidos para evitar coldstart
[www]
user  = www-data
group = www-data

listen = 9000

; Dynamic: escala entre min e max conforme carga
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 4
pm.min_spare_servers = 3
pm.max_spare_servers = 6
; Recicla worker após 500 requests para evitar memory leak
pm.max_requests      = 500

; Log lento: requisições acima de 5s aparecem no log
request_slowlog_timeout = 5s

; Passa variáveis de ambiente para o PHP
clear_env = no
