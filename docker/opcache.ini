; Opcache tuning para Docker Desktop Windows (bind mount lento)
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
; Não revalida timestamps a cada request — grande ganho no bind mount do Windows
; Troca: mudanças em .php exigem "docker exec php kill -USR2 1" ou restart do container
opcache.validate_timestamps=0
opcache.fast_shutdown=1
opcache.enable_file_override=1
